services:
  - type: web
    name: nolimit-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: nolimit-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://nolimit-app.com
      - key: JWT_SECRET
        generateValue: true
      - key: LOG_LEVEL
        value: info

  - type: pserv
    name: nolimit-db
    ipAllowList: []
    plan: starter
    postgresVersion: "15"
